name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0 # Full history for SonarQube

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: '1.26'
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run go fmt
      run: |
        if [ "$(go fmt ./... | wc -l)" -gt 0 ]; then
          echo "Files formatted incorrectly. Run 'go fmt ./...'"
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Build
      run: make build

    - name: Test
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out

  sonarqube-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0 # Full history for SonarQube

    - name: Download coverage report
      uses: actions/download-artifact@v8
      with:
        name: coverage-report

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=crypticseeds_concurrent-job-queue
          -Dsonar.organization=devopsfoundry
          -Dsonar.tests=.
          -Dsonar.test.inclusions=**/*_test.go
          -Dsonar.go.coverage.reportPaths=coverage.out

  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }} .

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Login to Docker Hub
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }}
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:latest

