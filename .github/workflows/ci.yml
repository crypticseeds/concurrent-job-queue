name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Full history for SonarQube

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run go fmt
      run: |
        if [ "$(go fmt ./... | wc -l)" -gt 0 ]; then
          echo "Files formatted incorrectly. Run 'go fmt ./...'"
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Build
      run: make build

    - name: Test
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v7
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=crypticseeds_concurrent-job-queue
          -Dsonar.organization=devopsfoundry
          -Dsonar.test.inclusions=**/*_test.go
          -Dsonar.go.coverage.reportPaths=coverage.out

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }} .

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }}
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/concurrent-job-queue:latest

