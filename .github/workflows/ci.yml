name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run go fmt
      run: |
        if [ "$(go fmt ./... | wc -l)" -gt 0 ]; then
          echo "Files formatted incorrectly. Run 'go fmt ./...'"
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Build
      run: make build

    - name: Test
      run: go test -v -race ./...
