version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - WORKER_COUNT=${WORKER_COUNT:-10}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgres://user:password@postgres:5432/jobqueue?sslmode=disable}
      - TASK_TTL=${TASK_TTL:-1h}
      - HTTP_READ_TIMEOUT=${HTTP_READ_TIMEOUT:-5s}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT:-10s}
      - HTTP_IDLE_TIMEOUT=${HTTP_IDLE_TIMEOUT:-120s}
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-jobqueue}
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus