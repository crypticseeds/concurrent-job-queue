apiVersion: apps/v1
kind: Deployment
metadata:
  name: concurrent-job-queue
  labels:
    app: concurrent-job-queue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: concurrent-job-queue
  template:
    metadata:
      labels:
        app: concurrent-job-queue
    spec:
      containers:
      - name: job-queue
        image: docker.io/${DOCKER_USERNAME:-yourusername}/concurrent-job-queue:latest
        ports:
        - containerPort: 8080
        env:
        - name: WORKER_COUNT
          value: "${WORKER_COUNT:-10}"
        - name: REDIS_ADDR
          value: "${REDIS_ADDR:-redis:6379}"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: job-queue-secrets
              key: DATABASE_URL
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
